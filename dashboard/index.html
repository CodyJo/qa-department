<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Back Office — HQ Dashboard</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a26;
    --surface-3: #22222e;
    --border: #2a2a3a;
    --text: #e4e4ef;
    --text-dim: #8888a0;
    --accent: #c4944a;
    --accent-2: #6c5ce7;
    --critical: #ff4757;
    --high: #ff8c42;
    --medium: #ffd166;
    --low: #4ecdc4;
    --info: #74b9ff;
    --success: #2ed573;
    --radius: 12px;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-top: 49px;
  }

  /* Top Bar */
  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .topbar-left { display: flex; align-items: center; gap: 1rem; }
  .logo {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.04em;
    text-decoration: none;
  }
  .product-select {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.45rem 0.7rem;
    font-family: var(--sans);
    font-size: 0.8rem;
    cursor: pointer;
    outline: none;
  }
  .product-select:focus { border-color: var(--accent); }
  .topbar-right { display: flex; align-items: center; gap: 0.75rem; }
  .topbar-btn {
    background: var(--surface-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.75rem;
    font-size: 0.72rem;
    cursor: pointer;
    font-family: var(--sans);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }
  .topbar-btn:hover { border-color: var(--accent); color: var(--text); }
  .timestamp { font-size: 0.72rem; color: var(--text-dim); }
  .stale-warning { font-size: 0.68rem; color: var(--high); margin-left: 0.25rem; }

  /* Container */
  .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

  /* Section Label */
  .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
  }

  /* Score Cards */
  .score-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 100px;
  }
  .score-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .score-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .score-card-name {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .score-card-value { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
  .score-card-trend { font-size: 0.68rem; color: var(--text-dim); margin-top: 0.15rem; }
  .trend-up { color: var(--success); }
  .trend-down { color: var(--critical); }
  .score-card-error { font-size: 0.78rem; color: var(--high); margin-top: 0.5rem; }
  .sparkline { display: flex; align-items: flex-end; gap: 2px; height: 20px; }
  .sparkline span {
    width: 4px;
    border-radius: 1px;
    background: var(--accent);
    opacity: 0.4;
    transition: height 0.3s;
  }
  .sparkline span:last-child { opacity: 1; }

  /* Skeleton Loading */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
    border-radius: 6px;
  }
  .skeleton-score { width: 48px; height: 28px; margin-bottom: 4px; }
  .skeleton-trend { width: 72px; height: 12px; }
  .skeleton-row { height: 52px; margin-bottom: 0.5rem; border-radius: 10px; }
  .skeleton-cell { display: inline-block; width: 44px; height: 30px; border-radius: 6px; }

  /* Matrix Table */
  .matrix {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 1.25rem;
  }
  .matrix th {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    padding: 0.7rem 0.5rem;
    text-align: center;
    background: var(--surface-2);
    font-weight: 500;
  }
  .matrix th:first-child { text-align: left; padding-left: 1rem; min-width: 140px; }
  .matrix td { padding: 0.5rem; text-align: center; border-top: 1px solid var(--border); }
  .matrix td:first-child { text-align: left; padding-left: 1rem; font-size: 0.82rem; font-weight: 500; }
  .matrix tr:hover td { background: rgba(255,255,255,0.02); }
  .cell {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 30px;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cell:hover { transform: scale(1.1); box-shadow: 0 0 12px rgba(0,0,0,0.3); }
  .cell.green { background: rgba(46,213,115,0.15); color: #2ed573; }
  .cell.yellow { background: rgba(255,209,102,0.15); color: #ffd166; }
  .cell.orange { background: rgba(255,140,66,0.15); color: #ff8c42; }
  .cell.red { background: rgba(255,71,87,0.15); color: #ff4757; }
  .cell.gray { background: rgba(136,136,160,0.1); color: #5a5a70; cursor: default; }
  .cell.gray:hover { transform: none; box-shadow: none; }

  /* Needs Attention Feed */
  .finding-row {
    display: grid;
    grid-template-columns: 60px 70px 1fr 120px 80px;
    align-items: center;
    gap: 0.75rem;
    padding: 0.7rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
    margin-bottom: 0.5rem;
  }
  .finding-row:hover { border-color: rgba(196,148,74,0.3); }
  .finding-dept {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    background: var(--surface-2);
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sev {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    text-align: center;
    white-space: nowrap;
  }
  .sev.critical { background: rgba(255,71,87,0.15); color: var(--critical); }
  .sev.high { background: rgba(255,140,66,0.15); color: var(--high); }
  .sev.medium { background: rgba(255,209,102,0.12); color: var(--medium); }
  .sev.low { background: rgba(78,205,196,0.12); color: var(--low); }
  .sev.info { background: rgba(116,185,255,0.12); color: var(--info); }
  .finding-title {
    font-size: 0.85rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .finding-repo {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-family: var(--mono);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .finding-effort { font-size: 0.68rem; color: var(--text-dim); text-align: right; }
  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    font-size: 0.6rem;
    background: rgba(108,92,231,0.15);
    color: #6c5ce7;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.03em;
    margin-left: 0.5rem;
    white-space: nowrap;
  }

  /* Empty / Error States */
  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--text-dim);
    font-size: 0.85rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  /* Responsive */
  @media (max-width: 1100px) {
    .score-row { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 700px) {
    .score-row { grid-template-columns: repeat(2, 1fr); }
    .finding-row { grid-template-columns: 50px 60px 1fr 80px; }
    .finding-effort { display: none; }
    .matrix { font-size: 0.75rem; }
    .topbar { padding: 0.5rem 1rem; }
    .container { padding: 1rem; }
    .slideover { width: 100%; right: -100%; }
    .detail-panel { width: 100%; right: -100%; }
  }

  /* Overlay + Slide-Over */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .overlay.open { opacity: 1; pointer-events: auto; }

  .slideover { position: fixed; top: 0; right: -65%; width: 65%; height: 100vh; background: var(--bg); border-left: 1px solid var(--border); z-index: 101; transition: right 0.3s ease; overflow-y: auto; display: flex; flex-direction: column; }
  .slideover.open { right: 0; }
  .slideover-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .slideover-title { font-size: 1.1rem; font-weight: 600; }
  .slideover-subtitle { font-size: 0.78rem; color: var(--text-dim); }
  .slideover-close { background: none; border: 1px solid var(--border); color: var(--text-dim); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
  .slideover-close:hover { border-color: var(--accent); color: var(--text); }

  /* Filters bar */
  .filters-bar { display: flex; align-items: center; gap: 0.6rem; padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; flex-wrap: wrap; }
  .filter-select { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.35rem 0.6rem; font-size: 0.72rem; font-family: var(--sans); outline: none; }
  .filter-select:focus { border-color: var(--accent); }
  .filter-search { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.35rem 0.6rem; font-size: 0.72rem; font-family: var(--sans); flex: 1; min-width: 140px; outline: none; }
  .filter-search::placeholder { color: var(--text-dim); }
  .filter-search:focus { border-color: var(--accent); }
  .filter-toggle { display: flex; align-items: center; gap: 0.35rem; font-size: 0.72rem; color: var(--text-dim); cursor: pointer; padding: 0.35rem 0.6rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface-2); }
  .filter-toggle.active { border-color: #6c5ce7; color: #6c5ce7; background: rgba(108,92,231,0.08); }
  .filter-toggle .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  .slideover-body { padding: 1.5rem; flex: 1; overflow-y: auto; }
  .slideover-score-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.25rem; }
  .slideover-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem; text-align: center; }
  .slideover-stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 0.35rem; }
  .slideover-stat-value { font-size: 1.3rem; font-weight: 700; }

  /* Finding Detail Panel (nested slide-over) */
  .detail-panel { position: fixed; top: 0; right: -45%; width: 45%; height: 100vh; background: var(--bg); border-left: 1px solid var(--border); z-index: 102; transition: right 0.3s ease; overflow-y: auto; }
  .detail-panel.open { right: 0; }
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface); }
  .detail-header-left { flex: 1; }
  .detail-id { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); margin-bottom: 0.35rem; }
  .detail-title { font-size: 1rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.5rem; }
  .detail-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .detail-tag { font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }
  .detail-body { padding: 1.5rem; }
  .detail-section { margin-bottom: 1.25rem; }
  .detail-section-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 0.5rem; }
  .detail-text { font-size: 0.88rem; line-height: 1.65; color: var(--text); }
  .detail-code { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; font-family: var(--mono); font-size: 0.78rem; color: var(--medium); line-height: 1.5; overflow-x: auto; margin-top: 0.4rem; white-space: pre-wrap; word-break: break-word; }
  .detail-fix { background: rgba(46,213,115,0.06); border: 1px solid rgba(46,213,115,0.15); border-radius: 8px; padding: 0.85rem 1rem; font-size: 0.85rem; line-height: 1.6; color: var(--text); }
  .detail-fix-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--success); margin-bottom: 0.4rem; }
  .detail-file { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 0.85rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 0.78rem; color: var(--text-dim); margin-top: 0.4rem; }
  .detail-file-icon { color: var(--accent); }
  .ai-fix-banner { display: flex; align-items: center; gap: 0.6rem; padding: 0.75rem 1rem; background: rgba(108,92,231,0.08); border: 1px solid rgba(108,92,231,0.2); border-radius: 8px; margin-bottom: 1.25rem; }
  .ai-fix-banner-icon { font-size: 1rem; }
  .ai-fix-banner-text { font-size: 0.82rem; color: #b8a9f0; }
  .ai-fix-banner-text strong { color: #6c5ce7; }
  .ai-fix-cmd { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); background: var(--surface-2); padding: 0.3rem 0.6rem; border-radius: 4px; margin-left: 0.5rem; cursor: pointer; border: 1px solid var(--border); display: inline-block; }
  .ai-fix-cmd:hover { border-color: #6c5ce7; color: #6c5ce7; }
  .backlog-info { font-size: 0.78rem; color: var(--text-dim); padding: 0.6rem 0.85rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-top: 0.4rem; }

  /* Support Panels (Jobs / FAQ / Docs) */
  .support-panel-body { padding: 1.25rem 1.5rem; overflow-y: auto; flex: 1; }

  /* Jobs panel */
  .jobs-run {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 0.85rem; overflow: hidden;
  }
  .jobs-run-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  .jobs-run-title { font-size: 0.85rem; font-weight: 600; }
  .jobs-run-meta { font-size: 0.72rem; color: var(--text-dim); margin-top: 0.15rem; }
  .jobs-run-status {
    font-size: 0.68rem; font-weight: 600; padding: 0.2rem 0.55rem;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .jobs-run-status.complete { background: rgba(46,213,115,0.12); color: var(--success); }
  .jobs-run-status.running { background: rgba(116,185,255,0.12); color: var(--info); }
  .jobs-run-status.failed { background: rgba(255,71,87,0.12); color: var(--critical); }
  .jobs-run-status.queued { background: rgba(255,209,102,0.12); color: var(--medium); }

  .jobs-dept-list { padding: 0.5rem 0; }
  .jobs-dept-row {
    display: grid; grid-template-columns: 100px 70px 60px 70px 1fr;
    align-items: center; gap: 0.5rem; padding: 0.4rem 1rem;
    font-size: 0.78rem;
  }
  .jobs-dept-row:hover { background: rgba(255,255,255,0.02); }
  .jobs-dept-name { font-weight: 500; text-transform: capitalize; }
  .jobs-dept-status { font-size: 0.65rem; font-weight: 600; }
  .jobs-dept-status.complete { color: var(--success); }
  .jobs-dept-status.running { color: var(--info); }
  .jobs-dept-status.failed { color: var(--critical); }
  .jobs-dept-status.queued { color: var(--medium); }
  .jobs-dept-score { font-family: var(--mono); font-size: 0.75rem; text-align: right; }
  .jobs-dept-findings { font-size: 0.72rem; color: var(--text-dim); text-align: right; }
  .jobs-dept-elapsed { font-size: 0.68rem; color: var(--text-dim); }

  /* Support content containers */
  .support-content-wrap { min-height: 200px; }
  .support-loading { padding: 2rem; text-align: center; color: var(--text-dim); font-size: 0.85rem; }

  /* ── Operations Panel ── */
  .ops-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .ops-tab { padding: 0.7rem 1.25rem; font-size: 0.82rem; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: var(--sans); }
  .ops-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .ops-tab:hover { color: var(--text); }

  .ops-section { display: none; }
  .ops-section.active { display: block; }

  .ops-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .ops-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .ops-card-title { font-size: 0.82rem; font-weight: 600; }
  .ops-card-subtitle { font-size: 0.72rem; color: var(--text-dim); }

  .ops-badge { font-size: 0.65rem; font-weight: 600; padding: 0.2rem 0.55rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .ops-badge-running { background: rgba(108,92,231,0.15); color: #6c5ce7; }
  .ops-badge-complete, .ops-badge-done { background: rgba(46,213,115,0.15); color: var(--success); }
  .ops-badge-failed { background: rgba(255,71,87,0.15); color: var(--critical); }
  .ops-badge-idle, .ops-badge-queued { background: rgba(136,136,160,0.1); color: var(--text-dim); }
  .ops-badge-healthy { background: rgba(46,213,115,0.15); color: var(--success); }
  .ops-badge-unavailable { background: rgba(255,71,87,0.15); color: var(--critical); }

  .ops-btn { padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.78rem; font-family: var(--sans); cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
  .ops-btn-primary { background: var(--accent); color: #0a0a0f; border-color: var(--accent); font-weight: 600; }
  .ops-btn-primary:hover { opacity: 0.9; }
  .ops-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .ops-btn-danger { background: rgba(255,71,87,0.1); color: var(--critical); border-color: rgba(255,71,87,0.3); }
  .ops-btn-danger:hover { background: rgba(255,71,87,0.2); }
  .ops-btn-ghost { background: transparent; color: var(--text-dim); }
  .ops-btn-ghost:hover { color: var(--text); border-color: var(--accent); }
  .ops-btn-sm { padding: 0.35rem 0.7rem; font-size: 0.72rem; }

  .ops-form-group { margin-bottom: 1rem; }
  .ops-form-label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 0.4rem; }
  .ops-form-select, .ops-form-input { width: 100%; background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 0.55rem 0.75rem; font-family: var(--sans); font-size: 0.85rem; outline: none; }
  .ops-form-select:focus, .ops-form-input:focus { border-color: var(--accent); }
  .ops-form-input::placeholder { color: #5a5a70; }
  .ops-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .ops-form-check { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; cursor: pointer; }
  .ops-form-check input { accent-color: var(--accent); }

  .ops-job-row { display: grid; grid-template-columns: 100px 1fr 80px 100px 60px; align-items: center; gap: 0.75rem; padding: 0.65rem 0.85rem; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .ops-job-row:last-child { border-bottom: none; }
  .ops-job-dept { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); }
  .ops-job-target { font-weight: 500; }
  .ops-job-time { font-size: 0.72rem; color: var(--text-dim); font-family: var(--mono); }
  .ops-progress-bar { height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
  .ops-progress-fill { height: 100%; background: #6c5ce7; border-radius: 2px; transition: width 0.3s; }

  .ops-overnight-status { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.25rem; }
  .ops-overnight-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem; text-align: center; }
  .ops-overnight-stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 0.35rem; }
  .ops-overnight-stat-value { font-size: 1.2rem; font-weight: 700; }

  .ops-cycle-row { display: grid; grid-template-columns: 180px 1fr 60px 60px 60px 80px; align-items: center; gap: 0.75rem; padding: 0.6rem 0.85rem; border-bottom: 1px solid var(--border); font-size: 0.78rem; }
  .ops-cycle-id { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); }

  .ops-backend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .ops-backend-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .ops-backend-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .ops-backend-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.75rem; }
  .ops-backend-stat { font-size: 0.75rem; color: var(--text-dim); }
  .ops-backend-stat strong { color: var(--text); }

  .ops-source-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.25rem; }
  .ops-source-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 1.25rem; text-align: center; cursor: pointer; transition: all 0.15s; }
  .ops-source-card:hover { border-color: var(--accent); }
  .ops-source-card.selected { border-color: var(--accent); background: rgba(196,148,74,0.05); }
  .ops-source-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .ops-source-label { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; }
  .ops-source-desc { font-size: 0.72rem; color: var(--text-dim); }

  .ops-cmd-box { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; font-family: var(--mono); font-size: 0.78rem; color: var(--medium); display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; word-break: break-all; }
  .ops-cmd-copy { font-size: 0.65rem; color: var(--accent); cursor: pointer; border: 1px solid var(--accent); padding: 0.2rem 0.5rem; border-radius: 4px; background: none; font-family: var(--sans); flex-shrink: 0; margin-left: 0.75rem; }
  .ops-cmd-copy:hover { background: rgba(196,148,74,0.1); }

  .ops-feedback { font-size: 0.78rem; padding: 0.6rem 0.85rem; border-radius: 8px; margin-top: 0.75rem; display: none; }
  .ops-feedback.success { display: block; background: rgba(46,213,115,0.08); border: 1px solid rgba(46,213,115,0.2); color: var(--success); }
  .ops-feedback.error { display: block; background: rgba(255,71,87,0.08); border: 1px solid rgba(255,71,87,0.2); color: var(--critical); }

  .ops-routing-table { font-size: 0.78rem; }
  .ops-routing-row { display: grid; grid-template-columns: 200px 1fr; gap: 0.35rem 1rem; padding: 0.2rem 0; }
  .ops-routing-task { color: var(--text-dim); }

  @media (max-width: 700px) {
    .ops-overnight-status { grid-template-columns: repeat(2, 1fr); }
    .ops-backend-grid { grid-template-columns: 1fr; }
    .ops-source-cards { grid-template-columns: 1fr; }
    .ops-form-row { grid-template-columns: 1fr; }
    .ops-job-row { grid-template-columns: 80px 1fr 70px 80px; }
    .ops-job-row > :last-child { display: none; }
    .ops-cycle-row { grid-template-columns: 120px 1fr 50px 50px 70px; }
    .ops-cycle-row > :nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<!-- Top Bar (fixed) -->
<div class="topbar">
  <div class="topbar-left">
    <a class="logo" href="index-new.html">Back Office</a>
    <select class="product-select" id="productSelect" aria-label="Select product">
    </select>
  </div>
  <div class="topbar-right">
    <button class="topbar-btn" id="opsBtn" style="border-color:var(--accent);color:var(--accent);">Ops</button>
    <button class="topbar-btn" id="jobsBtn">Jobs</button>
    <button class="topbar-btn" id="docsBtn">Docs</button>
    <button class="topbar-btn" id="faqBtn">FAQ</button>
    <span class="timestamp" id="lastScan">Last scan: --</span>
    <span class="stale-warning" id="staleWarning" hidden>Data may be stale</span>
  </div>
</div>

<div class="container">
  <!-- Score Cards -->
  <div class="score-row" id="scoreRow"></div>

  <!-- Product x Department Matrix -->
  <div class="section-label">Product x Department</div>
  <table class="matrix" id="matrixTable">
    <thead>
      <tr>
        <th>Product</th>
        <th>QA</th>
        <th>SEO</th>
        <th>ADA</th>
        <th>Compliance</th>
        <th>Monetization</th>
        <th>Product</th>
      </tr>
    </thead>
    <tbody id="matrixBody"></tbody>
  </table>

  <!-- Needs Attention -->
  <div class="section-label">Needs Attention</div>
  <div id="needsAttention"></div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay"></div>

<!-- Department Slide-Over -->
<div class="slideover" id="slideover">
  <div class="slideover-header">
    <div>
      <div class="slideover-title" id="slideoverTitle"></div>
      <div class="slideover-subtitle" id="slideoverSubtitle"></div>
    </div>
    <button class="slideover-close" id="slideoverCloseBtn">&times;</button>
  </div>

  <div class="filters-bar">
    <select class="filter-select" id="filterSeverity" aria-label="Filter by severity">
      <option value="all">All Severities</option>
      <option value="critical">Critical</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
      <option value="info">Info</option>
    </select>
    <select class="filter-select" id="filterStatus" aria-label="Filter by status">
      <option value="all">All Status</option>
      <option value="open">Open</option>
      <option value="fixed">Fixed</option>
      <option value="presumed_fixed">Presumed Fixed</option>
    </select>
    <select class="filter-select" id="filterEffort" aria-label="Filter by effort">
      <option value="all">All Effort</option>
      <option value="easy">Easy</option>
      <option value="moderate">Moderate</option>
      <option value="hard">Hard</option>
      <option value="unknown">Unknown</option>
    </select>
    <div class="filter-toggle" id="filterAiFixable">
      <span class="dot"></span> AI Fixable
    </div>
    <input class="filter-search" id="filterSearch" placeholder="Search findings..." type="text" aria-label="Search findings">
  </div>

  <div class="slideover-body" id="slideoverBody"></div>
</div>

<!-- Finding Detail Panel (nested) -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <div class="detail-header-left" id="detailHeaderLeft"></div>
    <button class="slideover-close" id="detailCloseBtn">&times;</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<script>
(function() {
  'use strict';

  /* ── Constants ── */
  var DEPT_KEYS = ['qa', 'seo', 'ada', 'compliance', 'monetization', 'product', 'cloud-ops'];
  var DEPT_LABELS = {
    qa: 'QA', seo: 'SEO', ada: 'ADA',
    compliance: 'Compliance', monetization: 'Monetization', product: 'Product',
    'cloud-ops': 'Cloud Ops'
  };
  var DEPT_SOURCES = {
    qa:           {url: 'qa-data.json',           scoreField: null},
    seo:          {url: 'seo-data.json',          scoreField: 'seo_score'},
    ada:          {url: 'ada-data.json',           scoreField: 'compliance_score'},
    compliance:   {url: 'compliance-data.json',    scoreField: 'compliance_score'},
    monetization: {url: 'monetization-data.json',  scoreField: 'monetization_readiness_score'},
    product:      {url: 'product-data.json',       scoreField: 'product_readiness_score'},
    'cloud-ops':  {url: 'cloud-ops-data.json',     scoreField: 'cloud_ops_score'}
  };
  var SEV_ORDER  = {critical: 0, high: 1, medium: 2, low: 3, info: 4};
  var EFFORT_ORDER = {easy: 0, moderate: 1, hard: 2};
  var STALE_MS = 24 * 60 * 60 * 1000;

  /* ── State ── */
  var orgData = null;
  var deptData = {};
  var deptErrors = {};
  var backlogData = null;
  var historyData = null;
  var selectedProduct = 'all';

  /* ── Helpers ── */

  function escapeHtml(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function scoreColor(s) {
    if (s == null) return 'gray';
    if (s >= 85) return 'green';
    if (s >= 65) return 'yellow';
    if (s >= 50) return 'orange';
    return 'red';
  }

  function scoreColorVar(s) {
    if (s == null) return 'var(--text-dim)';
    if (s >= 85) return 'var(--success)';
    if (s >= 65) return 'var(--medium)';
    if (s >= 50) return 'var(--high)';
    return 'var(--critical)';
  }

  function deriveQaScore(summary) {
    if (!summary) return null;
    var c = summary.critical || 0;
    var h = summary.high || 0;
    var m = summary.medium || 0;
    var l = summary.low || 0;
    return Math.max(0, Math.min(100, 100 - c * 15 - h * 8 - m * 3 - l));
  }

  function getRepoScore(dept, repoObj) {
    if (!repoObj || !repoObj.summary) return null;
    if (dept === 'qa') return deriveQaScore(repoObj.summary);
    var field = DEPT_SOURCES[dept].scoreField;
    if (!field) return null;
    var val = repoObj.summary[field];
    return val != null ? val : null;
  }

  function timeAgo(dateStr) {
    if (!dateStr) return '--';
    var ms = Date.now() - new Date(dateStr).getTime();
    if (ms < 0) ms = 0;
    var min = Math.floor(ms / 60000);
    if (min < 1) return 'just now';
    if (min < 60) return min + ' min ago';
    var hrs = Math.floor(min / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  }

  function isStale(dateStr) {
    if (!dateStr) return true;
    return (Date.now() - new Date(dateStr).getTime()) > STALE_MS;
  }

  function getProductRepos(productKey) {
    if (!orgData || !orgData.products) return [];
    if (productKey === 'all') {
      var allRepos = {};
      DEPT_KEYS.forEach(function(dept) {
        if (deptData[dept] && deptData[dept].repos) {
          deptData[dept].repos.forEach(function(r) { allRepos[r.name] = true; });
        }
      });
      return Object.keys(allRepos).sort();
    }
    var prod = orgData.products.find(function(p) { return p.key === productKey; });
    return prod ? (prod.repos || []) : [];
  }

  function findRepo(dept, repoName) {
    if (!deptData[dept] || !deptData[dept].repos) return null;
    return deptData[dept].repos.find(function(r) { return r.name === repoName; }) || null;
  }

  function getAvgScore(dept) {
    var repos = getProductRepos(selectedProduct);
    if (repos.length === 0 && selectedProduct === 'all') {
      if (!deptData[dept] || !deptData[dept].repos) return null;
      repos = deptData[dept].repos.map(function(r) { return r.name; });
    }
    var scores = [];
    repos.forEach(function(repoName) {
      var s = getRepoScore(dept, findRepo(dept, repoName));
      if (s != null) scores.push(s);
    });
    if (scores.length === 0) return null;
    return Math.round(scores.reduce(function(a, b) { return a + b; }, 0) / scores.length);
  }

  function getSparkline(dept) {
    if (!historyData || !historyData.snapshots) return [];
    var repos = getProductRepos(selectedProduct);
    return historyData.snapshots.slice(-5).map(function(snap) {
      if (!snap.scores) return null;
      var vals = [];
      if (repos.length === 0 && selectedProduct === 'all') {
        Object.keys(snap.scores).forEach(function(rk) {
          var v = snap.scores[rk][dept];
          if (v != null) vals.push(v);
        });
      } else {
        repos.forEach(function(repoName) {
          var sk = Object.keys(snap.scores).find(function(k) {
            return k === repoName || k.replace(/-/g, '') === repoName.replace(/-/g, '');
          });
          if (sk && snap.scores[sk][dept] != null) vals.push(snap.scores[sk][dept]);
        });
      }
      if (vals.length === 0) return null;
      return Math.round(vals.reduce(function(a, b) { return a + b; }, 0) / vals.length);
    });
  }

  function computeTrend(sparkVals, currentScore) {
    if (!sparkVals || sparkVals.length < 2 || currentScore == null) return {label: '', cls: ''};
    var prev = null;
    for (var i = sparkVals.length - 2; i >= 0; i--) {
      if (sparkVals[i] != null) { prev = sparkVals[i]; break; }
    }
    if (prev == null) return {label: '', cls: ''};
    var delta = currentScore - prev;
    if (delta > 0) return {label: '+' + delta + ' from last scan', cls: 'trend-up'};
    if (delta < 0) return {label: delta + ' from last scan', cls: 'trend-down'};
    return {label: 'no change', cls: ''};
  }

  function getLatestTimestamp() {
    var latest = null;
    DEPT_KEYS.forEach(function(dept) {
      if (deptData[dept] && deptData[dept].generated_at) {
        var t = new Date(deptData[dept].generated_at).getTime();
        if (!latest || t > latest) latest = t;
      }
    });
    return latest ? new Date(latest).toISOString() : null;
  }

  /* ── DOM builders (safe — no innerHTML with user data) ── */

  function clearChildren(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function(k) {
        if (k === 'className') node.className = attrs[k];
        else if (k === 'textContent') node.textContent = attrs[k];
        else if (k === 'style') node.setAttribute('style', attrs[k]);
        else if (k === 'hidden') { if (attrs[k]) node.hidden = true; }
        else node.setAttribute(k, attrs[k]);
      });
    }
    if (children) {
      children.forEach(function(c) {
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else if (c) node.appendChild(c);
      });
    }
    return node;
  }

  function buildSparkline(sparkVals) {
    var wrap = el('div', {className: 'sparkline'});
    if (!sparkVals || sparkVals.length === 0) return wrap;
    sparkVals.forEach(function(v) {
      var bar = document.createElement('span');
      if (v == null) {
        bar.setAttribute('style', 'height:2px;opacity:0.15;');
      } else {
        var h = Math.max(3, Math.round((v / 100) * 20));
        bar.setAttribute('style', 'height:' + h + 'px;');
      }
      wrap.appendChild(bar);
    });
    return wrap;
  }

  /* ── Render functions ── */

  function renderSkeletons() {
    var row = document.getElementById('scoreRow');
    clearChildren(row);
    DEPT_KEYS.forEach(function(dept) {
      var card = el('div', {className: 'score-card', 'data-dept': dept}, [
        el('div', {className: 'score-card-header'}, [
          el('span', {className: 'score-card-name', textContent: DEPT_LABELS[dept]})
        ]),
        el('div', {className: 'skeleton skeleton-score'}),
        el('div', {className: 'skeleton skeleton-trend'})
      ]);
      row.appendChild(card);
    });

    var mb = document.getElementById('matrixBody');
    clearChildren(mb);
    for (var i = 0; i < 4; i++) {
      var tr = el('tr', null, [
        el('td', null, [el('div', {className: 'skeleton', style: 'width:80px;height:14px;'})])
      ]);
      DEPT_KEYS.forEach(function() {
        tr.appendChild(el('td', null, [el('div', {className: 'skeleton skeleton-cell'})]));
      });
      mb.appendChild(tr);
    }

    var na = document.getElementById('needsAttention');
    clearChildren(na);
    for (var j = 0; j < 5; j++) {
      na.appendChild(el('div', {className: 'skeleton skeleton-row'}));
    }
  }

  function renderScoreCards() {
    var row = document.getElementById('scoreRow');
    clearChildren(row);

    DEPT_KEYS.forEach(function(dept) {
      var card = el('div', {className: 'score-card', 'data-dept': dept});

      if (deptErrors[dept]) {
        card.appendChild(
          el('div', {className: 'score-card-header'}, [
            el('span', {className: 'score-card-name', textContent: DEPT_LABELS[dept]})
          ])
        );
        card.appendChild(
          el('div', {className: 'score-card-error', textContent: 'Failed to load ' + DEPT_LABELS[dept] + ' data'})
        );
        row.appendChild(card);
        return;
      }

      var score = getAvgScore(dept);
      var sparkVals = getSparkline(dept);
      var trend = computeTrend(sparkVals, score);
      var colorStyle = score != null ? 'color:' + scoreColorVar(score) : 'color:var(--text-dim)';

      card.appendChild(
        el('div', {className: 'score-card-header'}, [
          el('span', {className: 'score-card-name', textContent: DEPT_LABELS[dept]}),
          buildSparkline(sparkVals)
        ])
      );
      card.appendChild(
        el('div', {className: 'score-card-value', style: colorStyle, textContent: score != null ? String(score) : '--'})
      );
      if (trend.label) {
        card.appendChild(
          el('div', {className: 'score-card-trend' + (trend.cls ? ' ' + trend.cls : ''), textContent: trend.label})
        );
      }
      row.appendChild(card);
    });
  }

  function renderMatrix() {
    var mb = document.getElementById('matrixBody');
    clearChildren(mb);

    var repoNames;
    if (selectedProduct === 'all') {
      // Gather all unique repo names across all dept data
      var allRepos = {};
      DEPT_KEYS.forEach(function(dept) {
        if (deptData[dept] && deptData[dept].repos) {
          deptData[dept].repos.forEach(function(r) { allRepos[r.name] = true; });
        }
      });
      repoNames = Object.keys(allRepos).sort();
    } else {
      repoNames = getProductRepos(selectedProduct);
    }

    if (repoNames.length === 0) {
      var tr = el('tr', null, [
        el('td', {colspan: '7', style: 'text-align:center;color:var(--text-dim);padding:1.5rem;', textContent: 'No repos found for this product'})
      ]);
      mb.appendChild(tr);
      return;
    }

    repoNames.forEach(function(repoName) {
      var tr = el('tr');
      tr.appendChild(el('td', {textContent: repoName}));

      DEPT_KEYS.forEach(function(dept) {
        var td = el('td');
        var repoObj = findRepo(dept, repoName);
        var score = getRepoScore(dept, repoObj);

        if (score == null) {
          var gray = el('span', {className: 'cell gray'});
          gray.appendChild(document.createTextNode('\u2014'));
          td.appendChild(gray);
        } else {
          var cls = 'cell ' + scoreColor(score);
          var cell = el('span', {className: cls, textContent: String(score), 'data-dept': dept, 'data-repo': repoName});
          td.appendChild(cell);
        }
        tr.appendChild(td);
      });

      mb.appendChild(tr);
    });
  }

  function renderNeedsAttention() {
    var container = document.getElementById('needsAttention');
    clearChildren(container);

    var productRepos = getProductRepos(selectedProduct);

    // Collect findings across all depts
    var allFindings = [];
    DEPT_KEYS.forEach(function(dept) {
      if (!deptData[dept] || !deptData[dept].repos) return;
      deptData[dept].repos.forEach(function(repo) {
        if (selectedProduct !== 'all' && productRepos.indexOf(repo.name) === -1) return;
        if (!repo.findings) return;
        repo.findings.forEach(function(f) {
          // Lookup backlog audit_count
          var auditCount = 0;
          if (backlogData && backlogData.findings) {
            var keys = Object.keys(backlogData.findings);
            for (var bi = 0; bi < keys.length; bi++) {
              var bf = backlogData.findings[keys[bi]];
              if (bf.current_finding &&
                  bf.current_finding.department === (f.department || dept) &&
                  bf.current_finding.repo === (f.repo || repo.name) &&
                  bf.current_finding.title === f.title) {
                auditCount = bf.audit_count || 0;
                break;
              }
            }
          }

          allFindings.push({
            department: f.department || dept,
            severity: f.severity || 'info',
            title: f.title || '',
            repo: f.repo || repo.name,
            effort: f.effort || 'moderate',
            fixable_by_agent: f.fixable_by_agent || false,
            audit_count: auditCount,
            id: f.id || '',
            file: f.file || ''
          });
        });
      });
    });

    // Sort: severity asc, audit_count desc, effort asc
    allFindings.sort(function(a, b) {
      var sa = SEV_ORDER[a.severity] != null ? SEV_ORDER[a.severity] : 99;
      var sb = SEV_ORDER[b.severity] != null ? SEV_ORDER[b.severity] : 99;
      if (sa !== sb) return sa - sb;
      if (b.audit_count !== a.audit_count) return b.audit_count - a.audit_count;
      var ea = EFFORT_ORDER[a.effort] != null ? EFFORT_ORDER[a.effort] : 99;
      var eb = EFFORT_ORDER[b.effort] != null ? EFFORT_ORDER[b.effort] : 99;
      return ea - eb;
    });

    var top = allFindings.slice(0, 15);

    if (top.length === 0) {
      container.appendChild(el('div', {className: 'empty-state', textContent: 'No findings match current filters'}));
      return;
    }

    top.forEach(function(f) {
      var titleSpan = el('span', {className: 'finding-title'});
      titleSpan.appendChild(document.createTextNode(f.title));
      if (f.fixable_by_agent) {
        titleSpan.appendChild(el('span', {className: 'ai-badge', textContent: 'AI fixable'}));
      }

      var row = el('div', {
        className: 'finding-row',
        'data-finding': f.id,
        'data-dept': f.department,
        'data-repo': f.repo
      }, [
        el('span', {className: 'finding-dept', textContent: DEPT_LABELS[f.department] || f.department}),

        el('span', {className: 'finding-repo', textContent: f.repo}),
        el('span', {className: 'finding-effort', textContent: f.effort})
      ]);

      container.appendChild(row);
    });
  }

  /* ── URL Deep Linking ── */

    var params = new URLSearchParams(window.location.search);

    if (selectedProduct === 'all') {
      params.delete('product');
    } else {
      params.set('product', selectedProduct);
    }
    var qs = params.toString();
    history.replaceState(null, '', window.location.pathname + (qs ? '?' + qs : ''));
  }

  /* ── Data Loading ── */

  function fetchJson(url) {
    return fetch(url + '?t=' + Date.now()).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  function loadAll() {
    renderSkeletons();

    var promises = [];

    promises.push(
      fetchJson('org-data.json').then(function(d) { orgData = d; }).catch(function() { orgData = null; })
    );
    promises.push(
      fetchJson('score-history.json').then(function(d) { historyData = d; }).catch(function() { historyData = null; })
    );
    promises.push(
      fetchJson('backlog.json').then(function(d) { backlogData = d; }).catch(function() { backlogData = null; })
    );

    DEPT_KEYS.forEach(function(dept) {
      promises.push(
        fetchJson(DEPT_SOURCES[dept].url)
          .then(function(d) { deptData[dept] = d; deptErrors[dept] = false; })
          .catch(function() { deptData[dept] = null; deptErrors[dept] = true; })
      );

    Promise.all(promises).then(function() {
      selectedProduct = readProductFromUrl();
      populateProductSelector();
      renderAll();
    });
  }

  /* ── Init ── */
  loadAll();

  /* ─────────────────────────────────────────────────────────
     SLIDE-OVER PANEL SYSTEM (Tasks 7-9)
     ───────────────────────────────────────────────────────── */

  /* ── Panel State ── */
  var panelDept = null;        // currently open department
  var panelRepoFilter = null;  // null = all repos for product
  var panelFindings = [];      // filtered findings for current panel
  var panelAllFindings = [];   // unfiltered findings for current panel
  var currentFinding = null;   // finding shown in detail panel

  var filterSeverity = 'all';
  var filterStatus   = 'all';
  var filterEffort   = 'all';
  var filterAiFixable = false;
  var filterSearch   = '';

  /* ── SHA-256 hash (matches Python: sha256 of dept:repo:title:file lowercase trimmed, first 16 hex) ── */
  function findingHash(dept, repo, title, filePath) {
    var key = [dept, repo, title, filePath].map(function(s) { return (s || '').trim().toLowerCase(); }).join(':');
    // Use SubtleCrypto if available, else fallback to simple hash
    // For sync use, implement a simple sha256
    return simplesha256(key).substring(0, 16);
  }

  // Minimal synchronous SHA-256 (matches Python hashlib.sha256)
  function simplesha256(msg) {
    function rotr(x, n) { return (x >>> n) | (x << (32 - n)); }
    function ch(x, y, z) { return (x & y) ^ (~x & z); }
    function maj(x, y, z) { return (x & y) ^ (x & z) ^ (y & z); }
    function sigma0(x) { return rotr(x, 2) ^ rotr(x, 13) ^ rotr(x, 22); }
    function sigma1(x) { return rotr(x, 6) ^ rotr(x, 11) ^ rotr(x, 25); }
    function gamma0(x) { return rotr(x, 7) ^ rotr(x, 18) ^ (x >>> 3); }
    function gamma1(x) { return rotr(x, 17) ^ rotr(x, 19) ^ (x >>> 10); }
    var K = [
      0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
      0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
      0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
      0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
      0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
      0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
      0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
      0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
    ];
    var bytes = [];
    for (var i = 0; i < msg.length; i++) {
      var c = msg.charCodeAt(i);
      if (c < 0x80) bytes.push(c);
      else if (c < 0x800) { bytes.push(0xc0 | (c >> 6)); bytes.push(0x80 | (c & 0x3f)); }
      else { bytes.push(0xe0 | (c >> 12)); bytes.push(0x80 | ((c >> 6) & 0x3f)); bytes.push(0x80 | (c & 0x3f)); }
    }
    var bitLen = bytes.length * 8;
    bytes.push(0x80);
    while (bytes.length % 64 !== 56) bytes.push(0);
    bytes.push(0, 0, 0, 0);
    bytes.push((bitLen >>> 24) & 0xff, (bitLen >>> 16) & 0xff, (bitLen >>> 8) & 0xff, bitLen & 0xff);
    var H0=0x6a09e667,H1=0xbb67ae85,H2=0x3c6ef372,H3=0xa54ff53a,H4=0x510e527f,H5=0x9b05688c,H6=0x1f83d9ab,H7=0x5be0cd19;
    for (var off = 0; off < bytes.length; off += 64) {
      var W = new Array(64);
      for (var t = 0; t < 16; t++) W[t] = (bytes[off+t*4]<<24)|(bytes[off+t*4+1]<<16)|(bytes[off+t*4+2]<<8)|bytes[off+t*4+3];
      for (var t = 16; t < 64; t++) W[t] = (gamma1(W[t-2]) + W[t-7] + gamma0(W[t-15]) + W[t-16]) | 0;
      var a=H0,b=H1,c=H2,d=H3,e=H4,f=H5,g=H6,h=H7;
      for (var t = 0; t < 64; t++) {
        var T1 = (h + sigma1(e) + ch(e,f,g) + K[t] + W[t]) | 0;
        var T2 = (sigma0(a) + maj(a,b,c)) | 0;
        h=g; g=f; f=e; e=(d+T1)|0; d=c; c=b; b=a; a=(T1+T2)|0;
      }
      H0=(H0+a)|0; H1=(H1+b)|0; H2=(H2+c)|0; H3=(H3+d)|0; H4=(H4+e)|0; H5=(H5+f)|0; H6=(H6+g)|0; H7=(H7+h)|0;
    }
    function hex32(v) { return ('00000000' + (v >>> 0).toString(16)).slice(-8); }
    return hex32(H0)+hex32(H1)+hex32(H2)+hex32(H3)+hex32(H4)+hex32(H5)+hex32(H6)+hex32(H7);
  }

  /* ── Dept-specific 4th stat ── */
  function getDeptSpecificStat(dept, repos) {
    var label, value, color;
    switch (dept) {
      case 'qa':
        // Fixed count
        var fixedCount = 0;
        repos.forEach(function(r) {
          if (r.findings) r.findings.forEach(function(f) {
            if ((f.status || '').toLowerCase() === 'fixed') fixedCount++;
          });
        });
        label = 'Fixed'; value = String(fixedCount); color = 'var(--success)';
        break;
      case 'seo':
        // Overall seo_score (avg)
        var seoScores = [];
        repos.forEach(function(r) {
          if (r.summary && r.summary.seo_score != null) seoScores.push(r.summary.seo_score);
        });
        var avgSeo = seoScores.length > 0 ? Math.round(seoScores.reduce(function(a,b){return a+b;},0)/seoScores.length) : null;
        label = 'SEO Score'; value = avgSeo != null ? String(avgSeo) : '--'; color = avgSeo != null ? scoreColorVar(avgSeo) : 'var(--text-dim)';
        break;
      case 'ada':
        // WCAG level
        var adaScores = [];
        var hasCritHigh = false, hasMed = false;
        repos.forEach(function(r) {
          var s = getRepoScore('ada', r);
          if (s != null) adaScores.push(s);
          if (r.findings) r.findings.forEach(function(f) {
            var sev = (f.severity || '').toLowerCase();
            if (sev === 'critical' || sev === 'high') hasCritHigh = true;
            if (sev === 'medium') hasMed = true;
          });
        });
        var avgAda = adaScores.length > 0 ? Math.round(adaScores.reduce(function(a,b){return a+b;},0)/adaScores.length) : null;
        var wcagLevel = '--';
        if (avgAda != null) {
          if (avgAda >= 95 && !hasCritHigh && !hasMed) wcagLevel = 'AAA';
          else if (avgAda >= 70 && !hasCritHigh) wcagLevel = 'AA';
          else if (avgAda >= 40) wcagLevel = 'A';
          else wcagLevel = 'Below A';
        }
        label = 'WCAG Level'; value = wcagLevel; color = wcagLevel === 'AAA' ? 'var(--success)' : wcagLevel === 'AA' ? 'var(--medium)' : 'var(--high)';
        break;
      case 'compliance':
      case 'privacy':
        // Framework count
        var frameworks = {};
        repos.forEach(function(r) {
          if (r.findings) r.findings.forEach(function(f) {
            if (f.category) frameworks[f.category] = true;
            if (f.framework) frameworks[f.framework] = true;
          });
        });
        var fwCount = Object.keys(frameworks).length;
        label = 'Frameworks'; value = String(fwCount); color = 'var(--text)';
        break;
      case 'monetization':
        // Revenue estimate sum
        var revSum = 0;
        repos.forEach(function(r) {
          if (r.findings) r.findings.forEach(function(f) {
            if (f.revenue_estimate) {
              var num = parseFloat(String(f.revenue_estimate).replace(/[^0-9.]/g, ''));
              if (!isNaN(num)) revSum += num;
            }
          });
        });
        label = 'Revenue Est.'; value = revSum > 0 ? '$' + revSum.toLocaleString() : '$0'; color = 'var(--success)';
        break;
      case 'product':
        // Backlog items count
        var backlogCount = 0;
        repos.forEach(function(r) {
          if (r.findings) backlogCount += r.findings.length;
        });
        label = 'Backlog Items'; value = String(backlogCount); color = 'var(--text)';
        break;
      default:
        label = 'Items'; value = '--'; color = 'var(--text-dim)';
    }
    return {label: label, value: value, color: color};
  }

  /* ── Gather findings for a department ── */
  function gatherDeptFindings(dept, repoFilter) {
    var source = dept === 'privacy' ? deptData['privacy'] : deptData[dept];
    if (!source || !source.repos) return [];
    var productRepos = getProductRepos(selectedProduct);
    var findings = [];
    source.repos.forEach(function(repo) {
      if (repoFilter && repo.name !== repoFilter) return;
      if (!repoFilter && selectedProduct !== 'all' && productRepos.indexOf(repo.name) === -1) return;
      if (!repo.findings) return;
      repo.findings.forEach(function(f) {
        findings.push({
          department: f.department || dept,
          severity: (f.severity || 'info').toLowerCase(),
          title: f.title || '',
          repo: f.repo || repo.name,
          effort: (f.effort || 'unknown').toLowerCase(),
          fixable_by_agent: f.fixable_by_agent || false,
          id: f.id || '',
          file: f.file || '',
          line: f.line || null,
          description: f.description || '',
          evidence: f.evidence || '',
          impact: f.impact || '',
          fix_suggestion: f.fix_suggestion || '',
          category: f.category || '',
          status: (f.status || 'open').toLowerCase(),
          revenue_estimate: f.revenue_estimate || null,
          framework: f.framework || ''
        });
      });
    });
    // Sort by severity desc
    findings.sort(function(a, b) {
      var sa = SEV_ORDER[a.severity] != null ? SEV_ORDER[a.severity] : 99;
      var sb = SEV_ORDER[b.severity] != null ? SEV_ORDER[b.severity] : 99;
      return sa - sb;
    });
    return findings;
  }

  /* ── Apply client-side filters ── */
  function applyFilters() {
    var q = filterSearch.toLowerCase();
    panelFindings = panelAllFindings.filter(function(f) {
      if (filterSeverity !== 'all' && f.severity !== filterSeverity) return false;
      if (filterStatus !== 'all' && f.status !== filterStatus.toLowerCase().replace(/ /g, '_')) return false;
      if (filterEffort !== 'all' && f.effort !== filterEffort.toLowerCase()) return false;
      if (filterAiFixable && !f.fixable_by_agent) return false;
      if (q) {
        var haystack = [f.title, f.description, f.file, f.id, f.repo].join(' ').toLowerCase();
        if (haystack.indexOf(q) === -1) return false;
      }
      return true;
    });
    renderFindingsList();
  }

  /* ── Render the findings list inside slideover body ── */
  function renderFindingsList() {
    var listContainer = document.getElementById('slideoverFindings');
    if (!listContainer) return;
    clearChildren(listContainer);

    if (panelFindings.length === 0) {
      listContainer.appendChild(el('div', {className: 'empty-state', textContent: 'No findings match current filters'}));
      return;
    }

    panelFindings.forEach(function(f) {
      var titleSpan = el('span', {className: 'finding-title'});
      titleSpan.appendChild(document.createTextNode(f.title));
      if (f.fixable_by_agent) {
        titleSpan.appendChild(el('span', {className: 'ai-badge', textContent: 'AI fixable'}));
      }

      var row = el('div', {className: 'finding-row'}, [
        el('span', {className: 'sev ' + f.severity, textContent: f.severity}),
        titleSpan,
        el('span', {className: 'finding-effort', textContent: f.effort})
      ]);

      row.addEventListener('click', function() { openFindingDetail(f); });
      listContainer.appendChild(row);
    });

  /* ── Render Department Panel (Task 8) ── */
  function renderDeptPanel(dept, repoFilter) {
    var body = document.getElementById('slideoverBody');
    clearChildren(body);

    // Get filtered repos
    var source = dept === 'privacy' ? deptData['privacy'] : deptData[dept];
    var repos = [];
    if (source && source.repos) {
      var productRepos = getProductRepos(selectedProduct);
      source.repos.forEach(function(r) {
        if (repoFilter && r.name !== repoFilter) return;
        if (!repoFilter && selectedProduct !== 'all' && productRepos.indexOf(r.name) === -1) return;
        repos.push(r);
      });
    }

    // Compute stats
    var scores = [];
    repos.forEach(function(r) {
      var s = getRepoScore(dept === 'privacy' ? 'compliance' : dept, r);
      if (s != null) scores.push(s);
    });
    var avgScore = scores.length > 0 ? Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length) : null;

    var totalFindings = 0;
    var aiFixableCount = 0;
    repos.forEach(function(r) {
      if (r.findings) {
        totalFindings += r.findings.length;
        r.findings.forEach(function(f) {
          if (f.fixable_by_agent) aiFixableCount++;
        });
      }
    });

    var deptStat = getDeptSpecificStat(dept, repos);

    // Stats row
    var statsRow = el('div', {className: 'slideover-score-row'}, [
      el('div', {className: 'slideover-stat'}, [
        el('div', {className: 'slideover-stat-label', textContent: 'Score'}),
        el('div', {className: 'slideover-stat-value', style: 'color:' + (avgScore != null ? scoreColorVar(avgScore) : 'var(--text-dim)'), textContent: avgScore != null ? String(avgScore) : '--'})
      ]),
      el('div', {className: 'slideover-stat'}, [
        el('div', {className: 'slideover-stat-label', textContent: 'Findings'}),
        el('div', {className: 'slideover-stat-value', textContent: String(totalFindings)})
      ]),
      el('div', {className: 'slideover-stat'}, [
        el('div', {className: 'slideover-stat-label', textContent: 'AI Fixable'}),
        el('div', {className: 'slideover-stat-value', style: 'color:#6c5ce7', textContent: String(aiFixableCount)})
      ]),
      el('div', {className: 'slideover-stat'}, [
        el('div', {className: 'slideover-stat-label', textContent: deptStat.label}),
        el('div', {className: 'slideover-stat-value', style: 'color:' + deptStat.color, textContent: deptStat.value})
      ])
    ]);
    body.appendChild(statsRow);

    // Findings list container
    var listContainer = el('div', {id: 'slideoverFindings'});
    body.appendChild(listContainer);

    // Gather + apply
    panelAllFindings = gatherDeptFindings(dept, repoFilter);
    applyFilters();
  }

  /* ── Render Finding Detail (Task 9) ── */
  function renderFindingDetail(finding) {
    var body = document.getElementById('detailBody');
    clearChildren(body);

    // AI Fix Banner
    if (finding.fixable_by_agent) {
      var cmdText = 'make fix TARGET=' + (finding.repo || 'repo');
      var cmdSpan = el('span', {className: 'ai-fix-cmd', title: 'Click to copy', textContent: cmdText});
      cmdSpan.addEventListener('click', function(e) {
        e.stopPropagation();
        if (navigator.clipboard) {
          navigator.clipboard.writeText(cmdText);
          cmdSpan.textContent = 'Copied!';
          setTimeout(function() { cmdSpan.textContent = cmdText; }, 1500);
        }
      });

      var bannerTextDiv = el('div', {className: 'ai-fix-banner-text'});
      var strong = el('strong', {textContent: 'AI can fix this.'});
      bannerTextDiv.appendChild(strong);
      bannerTextDiv.appendChild(document.createTextNode(' The Back Office fix agent can resolve this automatically. '));
      bannerTextDiv.appendChild(cmdSpan);

      body.appendChild(el('div', {className: 'ai-fix-banner'}, [
        el('span', {className: 'ai-fix-banner-icon', textContent: '\u26A1'}),
        bannerTextDiv
      ]));
    }

    // Description
    if (finding.description) {
      body.appendChild(el('div', {className: 'detail-section'}, [
        el('div', {className: 'detail-section-title', textContent: 'Description'}),
        el('div', {className: 'detail-text', textContent: finding.description})
      ]));
    }

    // Evidence
    if (finding.evidence) {
      body.appendChild(el('div', {className: 'detail-section'}, [
        el('div', {className: 'detail-section-title', textContent: 'Evidence'}),
        el('div', {className: 'detail-code', textContent: finding.evidence})
      ]));
    }

    // Impact
    if (finding.impact) {
      body.appendChild(el('div', {className: 'detail-section'}, [
        el('div', {className: 'detail-section-title', textContent: 'Impact'}),
        el('div', {className: 'detail-text', textContent: finding.impact})
      ]));
    }

    // File
    if (finding.file) {
      var fileText = finding.file;
      if (finding.line) fileText += ':' + finding.line;
      body.appendChild(el('div', {className: 'detail-section'}, [
        el('div', {className: 'detail-section-title', textContent: 'File'}),
        el('div', {className: 'detail-file'}, [
          el('span', {className: 'detail-file-icon', textContent: '\uD83D\uDCC4'}),
          document.createTextNode(fileText)
        ])
      ]));
    }

    // Recommended Fix
    if (finding.fix_suggestion) {
      body.appendChild(el('div', {className: 'detail-section'}, [
        el('div', {className: 'detail-fix-title', textContent: 'Recommended Fix'}),
        el('div', {className: 'detail-fix', textContent: finding.fix_suggestion})
      ]));
    }

    // Backlog Info
    if (backlogData && backlogData.findings) {
      var hash = findingHash(finding.department, finding.repo, finding.title, finding.file);
      var entry = backlogData.findings[hash];
      if (entry) {
        var firstSeen = entry.first_seen ? new Date(entry.first_seen).toLocaleDateString() : 'Unknown';
        var lastSeen = entry.last_seen ? new Date(entry.last_seen).toLocaleDateString() : 'Unknown';
        var auditCount = entry.audit_count || 1;
        var infoText = 'First seen: ' + firstSeen + '  \u00B7  Seen in ' + auditCount + ' audit' + (auditCount !== 1 ? 's' : '') + '  \u00B7  Last seen: ' + lastSeen;
        body.appendChild(el('div', {className: 'detail-section'}, [
          el('div', {className: 'detail-section-title', textContent: 'Backlog'}),
          el('div', {className: 'backlog-info', textContent: infoText})
        ]));
      }
    }
  }

  /* ── Panel open/close functions ── */
  function openDeptPanel(department, repo) {
    panelDept = department;
    panelRepoFilter = repo || null;

    // Reset filters
    filterSeverity = 'all';
    filterStatus   = 'all';
    filterEffort   = 'all';
    filterAiFixable = false;
    filterSearch   = '';

    // Reset filter UI
    var sevSel = document.getElementById('filterSeverity');
    var statusSel = document.getElementById('filterStatus');
    var effortSel = document.getElementById('filterEffort');
    var aiToggle = document.getElementById('filterAiFixable');
    var searchInput = document.getElementById('filterSearch');

  function formatElapsed(sec) {
    if (!sec) return '--';
    if (sec < 60) return sec + 's';
    return Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
  }

  function buildJobsRunEl(run) {
    var status = (run.status || 'unknown').toLowerCase();
    var repoName = run.repo_name || run.target || 'unknown';

    var startedAt = run.started_at ? new Date(run.started_at) : null;
    var finishedAt = run.finished_at ? new Date(run.finished_at) : null;
    var dateStr = startedAt ? startedAt.toLocaleString() : '--';
    var elapsed = '';
    if (startedAt && finishedAt) {
      var diffSec = Math.round((finishedAt - startedAt) / 1000);
      elapsed = ' \u00B7 ' + formatElapsed(diffSec);
    }

    var wrap = document.createElement('div');
    wrap.className = 'jobs-run';

    // Header
    var header = document.createElement('div');
    header.className = 'jobs-run-header';

    var left = document.createElement('div');
    var title = document.createElement('div');
    title.className = 'jobs-run-title';
    title.textContent = repoName;
    var meta = document.createElement('div');
    meta.className = 'jobs-run-meta';
    meta.textContent = dateStr + elapsed;
    left.appendChild(title);
    left.appendChild(meta);

    var badge = document.createElement('span');
    badge.className = 'jobs-run-status ' + status;
    badge.textContent = status;

    header.appendChild(left);
    header.appendChild(badge);
    wrap.appendChild(header);

    // Department rows
    if (run.jobs && typeof run.jobs === 'object') {
      var deptList = document.createElement('div');
      deptList.className = 'jobs-dept-list';

      Object.keys(run.jobs).forEach(function(deptKey) {
        var job = run.jobs[deptKey];
        var row = document.createElement('div');
        row.className = 'jobs-dept-row';

        var dname = document.createElement('span');
        dname.className = 'jobs-dept-name';
        dname.textContent = DEPT_LABELS[deptKey] || deptKey;

        var dstatus = document.createElement('span');
        dstatus.className = 'jobs-dept-status ' + (job.status || 'unknown').toLowerCase();
        dstatus.textContent = job.status || 'unknown';

        var dscore = document.createElement('span');
        dscore.className = 'jobs-dept-score';
        dscore.style.color = job.score != null ? scoreColorVar(job.score) : 'var(--text-dim)';
        dscore.textContent = job.score != null ? String(job.score) : '--';

        var dfindings = document.createElement('span');
        dfindings.className = 'jobs-dept-findings';
        dfindings.textContent = job.findings_count != null ? job.findings_count + ' findings' : '';

        var delapsed = document.createElement('span');
        delapsed.className = 'jobs-dept-elapsed';
        delapsed.textContent = job.elapsed_seconds != null ? formatElapsed(job.elapsed_seconds) : '';

        row.appendChild(dname);
        row.appendChild(dstatus);
        row.appendChild(dscore);
        row.appendChild(dfindings);
        row.appendChild(delapsed);
        deptList.appendChild(row);
      });

      wrap.appendChild(deptList);
    }

    return wrap;
  }

  function renderJobsPanel() {
    var body = document.getElementById('slideoverBody');
    clearChildren(body);

    var wrap = document.createElement('div');
    wrap.className = 'support-content-wrap';
    wrap.style.padding = '1.25rem 1.5rem';

    // Load current job + history
    var currentP = fetch('.jobs.json?t=' + Date.now())
      .then(function(r) { return r.ok ? r.json() : null; })
      .catch(function() { return null; });

    var historyP = fetch('.jobs-history.json?t=' + Date.now())
      .then(function(r) { return r.ok ? r.json() : null; })
      .catch(function() { return null; });

    var loading = document.createElement('div');
    loading.className = 'support-loading';
    loading.textContent = 'Loading jobs\u2026';
    wrap.appendChild(loading);
    body.appendChild(wrap);

    Promise.all([currentP, historyP]).then(function(results) {
      var current = results[0];
      var history = results[1] || [];

      clearChildren(wrap);

      // Combine: current run at top, then history (deduplicated by run_id)
      var runs = [];
      var seenIds = {};

      if (current && current.run_id) {
        runs.push(current);
        seenIds[current.run_id] = true;
      }

      if (Array.isArray(history)) {
        history.slice().reverse().forEach(function(r) {
          if (!seenIds[r.run_id]) {
            runs.push(r);
            seenIds[r.run_id] = true;
          }
        });
      }

      if (runs.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No jobs found. Run an audit to see job history here.';
        wrap.appendChild(empty);
        return;
      }

      // Section label
      var label = document.createElement('div');
      label.className = 'section-label';
      label.style.marginBottom = '0.75rem';
      label.textContent = runs.length + ' run' + (runs.length !== 1 ? 's' : '');
      wrap.appendChild(label);

      runs.forEach(function(run) {
        wrap.appendChild(buildJobsRunEl(run));
      });
    });
  }
