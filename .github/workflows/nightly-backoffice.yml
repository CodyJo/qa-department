name: Nightly Back Office

on:
  schedule:
    - cron: "11 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  delivery-refresh:
    name: Delivery Metadata Refresh
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh delivery metadata
        run: python3 scripts/generate-delivery-data.py

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: back-office-nightly
          path: |
            dashboard/automation-data.json
            dashboard/data.json
          if-no-files-found: error
