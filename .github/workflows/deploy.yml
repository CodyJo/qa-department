name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'results/**'
      - 'scripts/**'
      - 'config/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/ci.yml'

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python tooling
        run: pip install ruff pyyaml

      - name: Validate shell syntax
        run: |
          bash -n scripts/sync-dashboard.sh
          bash -n scripts/quick-sync.sh
          bash -n scripts/job-status.sh
          bash -n agents/qa-scan.sh
          bash -n agents/seo-audit.sh
          bash -n agents/ada-audit.sh
          bash -n agents/compliance-audit.sh
          bash -n agents/monetization-audit.sh
          bash -n agents/product-audit.sh
          bash -n agents/fix-bugs.sh
          bash -n agents/watch.sh

      - name: Validate Python syntax
        run: python3 -m py_compile scripts/*.py

      - name: Lint Python scripts
        run: ruff check scripts/

      - name: Run Back Office regression suite
        run: make test

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python tooling
        run: pip install ruff pyyaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: Run Back Office deploy pipeline
        run: bash scripts/sync-dashboard.sh
