name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'results/**'
      - 'scripts/aggregate-results.py'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python scripts
        run: ruff check scripts/

  deploy:
    name: Deploy to S3 + CloudFront
    needs: lint
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      # ── Deploy to codyjo-com-photos bucket ──────────────────────────────
      - name: Upload qa.html to codyjo bucket
        run: |
          aws s3 cp dashboard/qa.html s3://codyjo-com-photos-7fa5a7d0/qa.html \
            --content-type "text/html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Upload qa-data.json to codyjo bucket
        run: |
          aws s3 cp dashboard/data.json s3://codyjo-com-photos-7fa5a7d0/qa-data.json \
            --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate codyjo CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EW2SF2IXBOKE5 \
            --paths "/qa.html" "/qa-data.json"

      # ── Deploy to thenewbeautifulme bucket ──────────────────────────────
      - name: Upload qa.html to thenewbeautifulme bucket
        run: |
          aws s3 cp dashboard/qa.html s3://thenewbeautifulme-site/qa.html \
            --content-type "text/html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Upload qa-data.json to thenewbeautifulme bucket
        run: |
          aws s3 cp dashboard/data.json s3://thenewbeautifulme-site/qa-data.json \
            --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate thenewbeautifulme CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1I21C6DXV70HC \
            --paths "/qa.html" "/qa-data.json"
