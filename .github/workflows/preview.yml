name: Preview Artifact

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python tooling
        run: pip install ruff pyyaml

      - name: Validate preview build inputs
        run: |
          bash -n scripts/run-agent.sh
          bash -n scripts/sync-dashboard.sh
          bash -n scripts/quick-sync.sh
          bash -n scripts/job-status.sh
          bash -n agents/qa-scan.sh
          bash -n agents/seo-audit.sh
          bash -n agents/ada-audit.sh
          bash -n agents/compliance-audit.sh
          bash -n agents/monetization-audit.sh
          bash -n agents/product-audit.sh
          bash -n agents/fix-bugs.sh
          bash -n agents/watch.sh
          python3 -m py_compile scripts/*.py
          ruff check scripts/
          make test

      - name: Generate current dashboard artifacts
        run: |
          python3 scripts/aggregate-results.py results dashboard/data.json
          python3 scripts/generate-delivery-data.py

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: back-office-dashboard-preview
          path: dashboard/
