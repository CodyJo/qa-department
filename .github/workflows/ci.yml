name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check required files exist
        run: |
          echo "Checking dashboard files..."
          test -f dashboard/qa.html || { echo "FAIL: dashboard/qa.html missing"; exit 1; }
          echo "  dashboard/qa.html OK"

          echo "Checking Python scripts..."
          test -f scripts/aggregate-results.py || { echo "FAIL: scripts/aggregate-results.py missing"; exit 1; }
          echo "  scripts/aggregate-results.py OK"

      - name: Validate Python syntax
        run: |
          echo "Checking Python syntax..."
          python3 -m py_compile scripts/aggregate-results.py
          echo "  scripts/aggregate-results.py OK"

      - name: Lint Python scripts
        run: |
          pip install ruff
          ruff check scripts/
