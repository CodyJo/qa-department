name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python tooling
        run: pip install pytest pytest-cov ruff pyyaml

      - name: Validate shell syntax
        run: |
          bash -n scripts/run-agent.sh
          bash -n scripts/sync-dashboard.sh
          bash -n scripts/quick-sync.sh
          bash -n scripts/job-status.sh
          bash -n agents/qa-scan.sh
          bash -n agents/seo-audit.sh
          bash -n agents/ada-audit.sh
          bash -n agents/compliance-audit.sh
          bash -n agents/monetization-audit.sh
          bash -n agents/product-audit.sh
          bash -n agents/fix-bugs.sh
          bash -n agents/watch.sh

      - name: Validate Python syntax
        run: |
          python3 -m py_compile scripts/*.py
          python3 -m compileall backoffice/ -q

      - name: Lint Python scripts
        run: ruff check scripts/ backoffice/

      - name: Run Back Office regression suite with coverage
        run: python3 -m pytest tests/ --cov=backoffice --cov-report=term --cov-report=xml

      - name: Publish coverage summary
        run: |
          echo "## Python Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          python3 -m pytest tests/ --cov=backoffice --cov-report=term 2>&1 | tail -20 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: back-office-coverage
          path: |
            coverage.xml
            coverage.json
