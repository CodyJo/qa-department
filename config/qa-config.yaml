# QA Department Configuration

aws:
  region: us-west-2

# Deploy dashboards to admin subdomains (not main site buckets)
# Each target gets its own copy of the dashboards with site-specific data.
# The 'repo' field filters data to only show that repo's findings.
dashboard_targets:
  - bucket: "admin-thenewbeautifulme-site"
    base_path: ""
    cloudfront_id: "E372ZR95FXKVT5"
    subdomain: "admin.thenewbeautifulme.com"
    repo: "thenewbeautifulme"
  - bucket: "admin-codyjo-site"
    base_path: ""
    cloudfront_id: "E30Z8D5XMDR1A9"
    subdomain: "admin.codyjo.com"
    repo: ""
  # Back Office self-audit dashboard at www.codyjo.com/back-office/
  - bucket: "www.codyjo.com"
    base_path: "back-office/dashboard"
    cloudfront_id: "EF4U8A7W3OH5K"
    subdomain: "www.codyjo.com"
    repo: ""

scan:
  run_linter: true
  run_tests: true
  security_audit: true
  performance_review: true
  code_quality: true
  min_severity: low
  max_findings: 200
  exclude_patterns:
    - "node_modules/**"
    - "venv/**"
    - ".git/**"
    - "*.min.js"

fix:
  auto_fix_severity: high
  run_tests_after_fix: true
  run_linter_after_fix: true
  max_parallel_fixes: 4
  auto_commit: true
  auto_push: false

notifications:
  sync_to_s3: true
