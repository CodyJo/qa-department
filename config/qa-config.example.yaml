# QA Department Configuration
# Copy to qa-config.yaml and customize

# AWS settings for dashboard hosting
aws:
  region: us-west-2
  dashboard_bucket: ""          # S3 bucket for qa.html
  cloudfront_distribution: ""   # CloudFront distribution ID (optional)

# Dashboard deployment targets
# Each target gets qa.html deployed to its S3 bucket
dashboard_targets:
  - bucket: "my-website-bucket"
    path: "qa.html"
    cloudfront_id: ""           # Optional: invalidate after deploy

# Scan settings
scan:
  # What to analyze
  run_linter: true
  run_tests: true
  security_audit: true
  performance_review: true
  code_quality: true

  # Severity threshold — only report issues at or above this level
  # Options: critical, high, medium, low, info
  min_severity: low

  # Max findings per scan (prevents runaway scans)
  max_findings: 200

  # File patterns to exclude from scanning
  exclude_patterns:
    - "node_modules/**"
    - "venv/**"
    - ".git/**"
    - "*.min.js"
    - "*.min.css"

# Fix agent settings
fix:
  # Auto-fix issues at or above this severity
  auto_fix_severity: high

  # Run tests after each fix
  run_tests_after_fix: true

  # Run linter after each fix
  run_linter_after_fix: true

  # Max concurrent worktree agents
  max_parallel_fixes: 4

  # Auto-commit fixes
  auto_commit: true

  # Auto-push after commit
  auto_push: false

  # Auto-deploy after push
  auto_deploy: false
  deploy_command: ""            # e.g., "bash scripts/deploy.sh"

# Notification settings (optional)
notifications:
  # Sync results to S3 after each scan/fix cycle
  sync_to_s3: true

  # Webhook URL for notifications (Slack, Discord, etc.)
  webhook_url: ""
