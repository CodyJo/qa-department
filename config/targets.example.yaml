# Target Repositories
# Copy to targets.yaml and customize
#
# Each target defines a repository the QA agents will scan and fix.

targets:
  - name: my-web-app
    path: /home/user/projects/my-web-app
    language: python
    # Linter command (run during QA scan)
    lint_command: "ruff check ."
    # Test command (run during QA scan and after fixes)
    test_command: "python3 -m pytest tests/ -q"
    # Deploy command (run after fixes are pushed)
    deploy_command: "bash scripts/deploy.sh"
    # Extra context for the QA agent
    context: |
      This is a serverless web app using AWS Lambda, DynamoDB, and S3.
      Focus on: security vulnerabilities, input validation, error handling,
      performance bottlenecks, and AWS best practices.

